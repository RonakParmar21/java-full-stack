<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Forecast Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<div class="container">

    <div class="search-card">

        <h1>Weather Forecast</h1>

        <div class="search-box">

            <input
                type="text"
                id="city"
                placeholder="Enter City Name"
                value="anand">

            <input
                type="number"
                id="days"
                placeholder="Days"
                min="1"
                max="10"
                value="3">

            <button onclick="getWeather()">
                Search
            </button>

        </div>

    </div>

    <div class="current-weather">

        <div class="left">

            <img id="weatherIcon"
                 src="icons/cloudy.svg">

        </div>

        <div class="right">

            <h2 id="location">---</h2>

            <h3 id="condition">---</h3>

            <div class="temp">
                <span id="temperature">0</span>°F
            </div>

        </div>

    </div>

    <div id="forecastContainer"
         class="forecast-grid">

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
